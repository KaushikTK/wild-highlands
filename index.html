<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survival FPS - Sunny Highlands</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Inter', sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 14px; height: 14px;
            transform: translate(-50%, -50%);
        }

        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(0, 0, 0, 0.5);
        }

        #crosshair::before { top: 0; left: 6px; width: 2px; height: 14px; }
        #crosshair::after { top: 6px; left: 0; width: 14px; height: 2px; }

        #stats {
            padding: 20px;
            color: #1a1a1a;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        #instructions {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(135,206,235,0.9) 100%);
            color: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .kbd-list { margin-top: 30px; color: #444; font-size: 0.85em; }
        kbd {
            background: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            color: #222;
            border: 1px solid #ccc;
            margin: 0 4px;
            font-family: monospace;
            box-shadow: 0 2px 0 #bbb;
        }
        h1 { font-weight: 900; letter-spacing: 12px; margin: 0; }
        .danger { color: #ff4400; }

        /* Mobile Controls */
        #mobile-controls {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: auto;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .action-buttons {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: grid;
            grid-template-areas: 
                "aim grenade"
                "fire fire";
            gap: 15px;
            pointer-events: auto;
        }

        .btn {
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid white;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            backdrop-filter: blur(5px);
            text-transform: uppercase;
        }

        .btn:active { background: white; color: black; }

        #btn-fire { grid-area: fire; width: 140px; height: 70px; border-radius: 35px; font-size: 20px; }
        #btn-aim { grid-area: aim; width: 60px; height: 60px; }
        #btn-grenade { grid-area: grenade; width: 60px; height: 60px; background: rgba(255, 68, 0, 0.3); }

        #touch-look-area {
            position: absolute;
            top: 0;
            right: 0;
            width: 60%;
            height: 100%;
            pointer-events: auto;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="stats">NEUTRALIZED: <span id="score">0</span></div>
    <div id="crosshair"></div>
</div>

<!-- Mobile Layer -->
<div id="mobile-controls">
    <div id="touch-look-area"></div>
    <div class="joystick-container" id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    <div class="action-buttons">
        <button class="btn" id="btn-aim">ADS</button>
        <button class="btn" id="btn-grenade">G</button>
        <button class="btn" id="btn-fire">FIRE</button>
    </div>
</div>

<div id="instructions">
    <h1>WILD <span class="danger">HIGHLANDS</span></h1>
    <p style="margin-top: 20px; letter-spacing: 2px;">PREDATORS DETECTED IN THE SECTOR</p>
    <div class="kbd-list" id="desktop-keys">
        <kbd>WASD</kbd> MOVE &nbsp; | &nbsp; 
        <kbd>L-CLICK</kbd> FIRE &nbsp; | &nbsp; 
        <kbd>R-CLICK</kbd> ADS &nbsp; | &nbsp; 
        <kbd>G</kbd> GRENADE
    </div>
    <p id="start-prompt" style="font-size: 0.8em; color: #555; margin-top: 40px; text-transform: uppercase;">Click to start</p>
</div>

<div id="game-over">
    <h1 style="color: #ff3333">CONTACT LOST</h1>
    <p style="letter-spacing: 5px;">YOU WERE OVERRUN BY THE WILDLIFE</p>
    <button onclick="location.reload()" style="padding: 15px 40px; cursor: pointer; background: #ff4400; border: none; color: white; font-weight: 900; margin-top: 30px; border-radius: 4px; text-transform: uppercase; letter-spacing: 2px;">Restart Mission</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer, clock, playerLight;
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
let isAiming = false;
let score = 0;
let isGameOver = false;

const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
const bullets = [];
const grenades = [];
const enemies = [];
const explosions = [];
const particles = [];

// Terrain settings
let terrainGeometry, terrainMesh;
const worldSize = 600;
const worldRes = 100;

const SPEED = 480.0;
const AIM_FOV = 35;
const NORMAL_FOV = 75;
const MOUSE_SENSITIVITY = 0.002;
const TOUCH_SENSITIVITY = 0.004;
const GRENADE_RADIUS = 18;

const instructions = document.getElementById('instructions');
const gameOverScreen = document.getElementById('game-over');
const scoreEl = document.getElementById('score');
const mobileControls = document.getElementById('mobile-controls');

// State for mobile
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

const ENEMY_TYPES = [
    { name: 'Lion', speed: 11, color: 0xccaa55, hitRadius: 1.8 },
    { name: 'Tiger', speed: 13, color: 0xff7700, hitRadius: 1.8 },
    { name: 'Bear', speed: 8, color: 0x442211, hitRadius: 1.8 },
    { name: 'Hyena', speed: 15, color: 0x887766, hitRadius: 1.8 },
    { name: 'Hunter', speed: 9, color: 0x334433, hitRadius: 1.8 }
];

const GLOBAL_ENEMY_SCALE = 1.75;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); 
    scene.fog = new THREE.Fog(0x87CEEB, 150, 700); 

    camera = new THREE.PerspectiveCamera(NORMAL_FOV, window.innerWidth / window.innerHeight, 0.01, 2000);
    camera.rotation.order = 'YXZ';

    const ambient = new THREE.AmbientLight(0xffffff, 0.75);
    scene.add(ambient);

    const sunLight = new THREE.DirectionalLight(0xfffaf0, 1.3);
    sunLight.position.set(150, 250, 150);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(1024, 1024);
    sunLight.shadow.camera.left = -300;
    sunLight.shadow.camera.right = 300;
    sunLight.shadow.camera.top = 300;
    sunLight.shadow.camera.bottom = -300;
    scene.add(sunLight);

    playerLight = new THREE.PointLight(0xffffff, 0.2, 10); 
    scene.add(playerLight);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = !isMobile; // Disable shadows on mobile for performance
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    setupTerrain();
    createWeapon();
    loadEnemies();
    
    if (isMobile) {
        setupMobileControls();
    } else {
        setupDesktopControls();
    }

    window.addEventListener('resize', onWindowResize);
    animate();
}

function setupTerrain() {
    terrainGeometry = new THREE.PlaneBufferGeometry(worldSize, worldSize, worldRes - 1, worldRes - 1);
    terrainGeometry.rotateX(-Math.PI / 2);
    const vertices = terrainGeometry.attributes.position.array;
    for (let i = 0; i < vertices.length; i += 3) {
        vertices[i + 1] = getTerrainHeight(vertices[i], vertices[i + 2]);
    }
    terrainGeometry.computeVertexNormals();
    terrainMesh = new THREE.Mesh(terrainGeometry, new THREE.MeshStandardMaterial({ color: 0x5a8c3c, roughness: 1 }));
    terrainMesh.receiveShadow = true;
    scene.add(terrainMesh);
}

function getTerrainHeight(x, z) {
    return (Math.sin(x * 0.04) * 6 + Math.cos(z * 0.04) * 6) + (Math.sin(x * 0.02 + z * 0.01) * 12);
}

let gunGroup, gunModel, muzzleFlash;
function createWeapon() {
    gunGroup = new THREE.Group();
    const mat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8 });
    const slide = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.1, 0.7), mat);
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.7), mat);
    barrel.rotation.x = Math.PI/2;
    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.4, 0.2), mat);
    grip.position.set(0, -0.2, 0.2);
    gunModel = new THREE.Group();
    gunModel.add(slide, barrel, grip);
    gunGroup.add(gunModel);
    
    muzzleFlash = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffaa, transparent: true, opacity: 0 }));
    muzzleFlash.position.z = -0.4;
    gunModel.add(muzzleFlash);

    gunGroup.position.set(0.35, -0.4, -0.7);
    camera.add(gunGroup);
    scene.add(camera);
}

function setupDesktopControls() {
    const keys = (e, s) => {
        switch(e.code) {
            case 'KeyW': moveForward = s; break;
            case 'KeyS': moveBackward = s; break;
            case 'KeyA': moveLeft = s; break;
            case 'KeyD': moveRight = s; break;
            case 'KeyG': if(s) throwGrenade(); break;
        }
    };
    document.addEventListener('keydown', e => keys(e, true));
    document.addEventListener('keyup', e => keys(e, false));
    
    instructions.addEventListener('click', () => {
        if (!isGameOver) document.body.requestPointerLock();
    });

    document.addEventListener('pointerlockchange', () => {
        instructions.style.display = document.pointerLockElement ? 'none' : 'flex';
    });

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement) {
            camera.rotation.y -= e.movementX * MOUSE_SENSITIVITY;
            camera.rotation.x -= e.movementY * MOUSE_SENSITIVITY;
            camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
        }
    });

    document.addEventListener('mousedown', e => {
        if (!document.pointerLockElement) return;
        if (e.button === 0) fire();
        if (e.button === 2) isAiming = true;
    });
    document.addEventListener('mouseup', e => { if (e.button === 2) isAiming = false; });
}

function setupMobileControls() {
    mobileControls.style.display = 'block';
    document.getElementById('desktop-keys').style.display = 'none';
    document.getElementById('start-prompt').innerText = 'Tap to Start Mission';

    instructions.addEventListener('click', () => {
        instructions.style.display = 'none';
    });

    // Joystick Logic
    const knob = document.getElementById('joystick-knob');
    const zone = document.getElementById('joystick-zone');
    let stickActive = false;

    const handleStick = (e) => {
        const touch = e.touches[0];
        const rect = zone.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const max = 50;

        if (dist > max) {
            dx *= max / dist;
            dy *= max / dist;
        }

        knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        
        // Map to movement
        const moveX = dx / max;
        const moveY = dy / max;
        moveForward = moveY < -0.3;
        moveBackward = moveY > 0.3;
        moveLeft = moveX < -0.3;
        moveRight = moveX > 0.3;
    };

    zone.addEventListener('touchstart', (e) => { stickActive = true; handleStick(e); });
    zone.addEventListener('touchmove', (e) => { if(stickActive) handleStick(e); });
    zone.addEventListener('touchend', () => {
        stickActive = false;
        knob.style.transform = `translate(-50%, -50%)`;
        moveForward = moveBackward = moveLeft = moveRight = false;
    });

    // Camera Look Logic (Touch Look Area)
    const lookArea = document.getElementById('touch-look-area');
    let lastTouchX, lastTouchY;

    lookArea.addEventListener('touchstart', e => {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
    });

    lookArea.addEventListener('touchmove', e => {
        const tx = e.touches[0].clientX;
        const ty = e.touches[0].clientY;
        const dx = tx - lastTouchX;
        const dy = ty - lastTouchY;
        
        camera.rotation.y -= dx * TOUCH_SENSITIVITY;
        camera.rotation.x -= dy * TOUCH_SENSITIVITY;
        camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
        
        lastTouchX = tx;
        lastTouchY = ty;
    });

    // Buttons
    document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); fire(); });
    document.getElementById('btn-aim').addEventListener('touchstart', (e) => { e.preventDefault(); isAiming = !isAiming; });
    document.getElementById('btn-grenade').addEventListener('touchstart', (e) => { e.preventDefault(); throwGrenade(); });
}

function fire() {
    if (isGameOver) return;
    const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.06, 4, 4), new THREE.MeshBasicMaterial({ color: 0x111111 }));
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    bullet.position.copy(camera.position).add(dir.clone().multiplyScalar(0.5));
    bullet.userData = { vel: dir.multiplyScalar(400), born: clock.elapsedTime };
    scene.add(bullet);
    bullets.push(bullet);
    muzzleFlash.material.opacity = 1.0;
    gunModel.position.z += 0.2;
    playerLight.intensity = 1.0;
    setTimeout(() => playerLight.intensity = 0.2, 50);
}

function throwGrenade() {
    if (isGameOver) return;
    const grenade = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), new THREE.MeshStandardMaterial({ color: 0x222222 }));
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    dir.y += 0.4;
    grenade.position.copy(camera.position).add(dir.clone().multiplyScalar(1));
    grenade.userData = { vel: dir.normalize().multiplyScalar(50), gravity: -2.0, timer: 2.0 };
    scene.add(grenade);
    grenades.push(grenade);
}

function createExplosion(pos) {
    const geo = new THREE.SphereGeometry(1.5, 16, 16);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffdd44, transparent: true, opacity: 0.9 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    scene.add(mesh);
    explosions.push({ mesh, scale: 0.5 });
    
    for (let i = enemies.length - 1; i >= 0; i--) {
        if (enemies[i].model.position.distanceTo(pos) < GRENADE_RADIUS) {
            scene.remove(enemies[i].model);
            enemies.splice(i, 1);
            score++;
            scoreEl.innerText = score;
        }
    }
}

function spawnEnemy(loader, url) {
    const type = ENEMY_TYPES[Math.floor(Math.random() * ENEMY_TYPES.length)];
    loader.load(url, (gltf) => {
        const model = gltf.scene;
        model.scale.set(GLOBAL_ENEMY_SCALE, GLOBAL_ENEMY_SCALE, GLOBAL_ENEMY_SCALE);
        const angle = Math.random() * Math.PI * 2;
        const dist = 100 + Math.random() * 50;
        model.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
        model.traverse(n => { if (n.isMesh) { n.material = n.material.clone(); n.material.color.setHex(type.color); n.castShadow = true; } });
        const mixer = new THREE.AnimationMixer(model);
        const run = gltf.animations.find(a => a.name === 'Run');
        if (run) mixer.clipAction(run).play();
        scene.add(model);
        enemies.push({ model, mixer, type });
    });
}

function loadEnemies() {
    const loader = new THREE.GLTFLoader();
    const url = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Soldier.glb';
    for(let i=0; i<8; i++) spawnEnemy(loader, url);
    setInterval(() => { if(enemies.length < 30 && !isGameOver && (isMobile || document.pointerLockElement)) spawnEnemy(loader, url); }, 2000);
}

function updatePhysics(delta) {
    if (isGameOver || (instructions.style.display !== 'none' && !isMobile)) return;

    velocity.x -= velocity.x * 10.0 * delta;
    velocity.z -= velocity.z * 10.0 * delta;
    direction.z = Number(moveForward) - Number(moveBackward);
    direction.x = Number(moveRight) - Number(moveLeft);
    direction.normalize();

    if (moveForward || moveBackward) velocity.z -= direction.z * SPEED * delta;
    if (moveLeft || moveRight) velocity.x -= direction.x * SPEED * delta;

    camera.translateX(-velocity.x * delta);
    camera.translateZ(velocity.z * delta);
    camera.position.y = getTerrainHeight(camera.position.x, camera.position.z) + 1.8;

    const targetGunPos = isAiming ? new THREE.Vector3(0, -0.42, -0.3) : new THREE.Vector3(0.35, -0.4, -0.7);
    gunGroup.position.lerp(targetGunPos, 0.2);
    camera.fov += ((isAiming ? AIM_FOV : NORMAL_FOV) - camera.fov) * 0.15;
    camera.updateProjectionMatrix();
    muzzleFlash.material.opacity *= 0.5;
    gunModel.position.z *= 0.8;

    enemies.forEach((e, i) => {
        e.mixer.update(delta);
        const lookPos = camera.position.clone();
        lookPos.y = e.model.position.y;
        e.model.lookAt(lookPos);
        e.model.rotateY(Math.PI);
        const dir = new THREE.Vector3().subVectors(camera.position, e.model.position).normalize();
        e.model.position.add(dir.multiplyScalar(e.type.speed * delta));
        e.model.position.y = getTerrainHeight(e.model.position.x, e.model.position.z);
        if(e.model.position.distanceTo(camera.position) < 2.5) gameOver();
    });

    bullets.forEach((b, i) => {
        b.position.add(b.userData.vel.clone().multiplyScalar(delta));
        enemies.forEach((e, j) => {
            if(b.position.distanceTo(e.model.position.clone().add(new THREE.Vector3(0,1.5,0))) < e.type.hitRadius) {
                scene.remove(e.model);
                enemies.splice(j, 1);
                score++;
                scoreEl.innerText = score;
                b.userData.hit = true;
            }
        });
        if(clock.elapsedTime - b.userData.born > 2 || b.userData.hit) { scene.remove(b); bullets.splice(i, 1); }
    });

    grenades.forEach((g, i) => {
        g.userData.vel.y += g.userData.gravity;
        g.position.add(g.userData.vel.clone().multiplyScalar(delta));
        g.userData.timer -= delta;
        if(g.position.y < getTerrainHeight(g.position.x, g.position.z)) { g.position.y = getTerrainHeight(g.position.x, g.position.z); g.userData.vel.set(0,0,0); }
        if(g.userData.timer <= 0) { createExplosion(g.position); scene.remove(g); grenades.splice(i, 1); }
    });

    explosions.forEach((ex, i) => {
        ex.scale += delta * 50;
        ex.mesh.scale.setScalar(ex.scale);
        ex.mesh.material.opacity -= delta * 3;
        if(ex.mesh.material.opacity <= 0) { scene.remove(ex.mesh); explosions.splice(i, 1); }
    });
}

function gameOver() { isGameOver = true; gameOverScreen.style.display = 'flex'; if(document.pointerLockElement) document.exitPointerLock(); }
function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
function animate() { requestAnimationFrame(animate); updatePhysics(clock.getDelta()); renderer.render(scene, camera); }
window.onload = init;
</script>
</body>
</html>
